<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Outreach Pro — Premium v5</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#07090F;--s1:#0C1018;--s2:#111620;--s3:#161D2A;--b1:#1E2940;--b2:#253047;--blue:#4D8EFF;--b2l:#7AACFF;--green:#00E5A0;--g2:#00B87F;--red:#FF4466;--gold:#FFB800;--purple:#9B72FF;--orange:#FF7B3B;--text:#EEF2FF;--t2:#8A9BBF;--t3:#4A5A78;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:"DM Sans",sans-serif;min-height:100vh;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(77,142,255,0.07) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 90% 100%,rgba(155,114,255,0.06) 0%,transparent 70%);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}

/* PARTNERS */
.ptab-f{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);color:var(--t2);background:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.ptab-f:hover{border-color:var(--purple);color:var(--purple);}
.ptab-f.on{background:var(--purple);border-color:var(--purple);color:#fff;}
.pcard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px 16px;transition:all .15s;}
.pcard:hover{border-color:var(--purple);}
.pcard-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.pav{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff;flex-shrink:0;}
.pname{font-weight:700;font-size:14px;color:var(--text);}
.ptype-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;border:1px solid;}
.ptype-developer{background:rgba(77,142,255,.1);color:var(--blue);border-color:rgba(77,142,255,.3);}
.ptype-agency{background:rgba(155,114,255,.1);color:var(--purple);border-color:rgba(155,114,255,.3);}
.ptype-freelancer{background:rgba(0,229,160,.1);color:var(--green);border-color:rgba(0,229,160,.3);}
.pstatus-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;}
.pstatus-prospect{background:rgba(77,142,255,.15);color:var(--blue);}
.pstatus-contacted{background:rgba(255,184,0,.15);color:var(--gold);}
.pstatus-talking{background:rgba(155,114,255,.15);color:var(--purple);}
.pstatus-active{background:rgba(0,229,160,.15);color:var(--green);}
.pstatus-paused{background:rgba(74,90,120,.2);color:var(--t2);}
.pstatus-lost{background:rgba(255,68,102,.1);color:var(--red);}
.pinfo-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;}
.pinfo-item{font-size:11px;color:var(--t2);}
.pinfo-item b{color:var(--text);}
.pcard-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--b1);}
/* HOT SCORE */
.hot-score{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;border:1px solid;}
.hot-fire{background:rgba(255,75,75,0.12);color:#FF4B4B;border-color:rgba(255,75,75,0.3);}
.hot-warm{background:rgba(255,184,0,0.12);color:var(--gold);border-color:rgba(255,184,0,0.3);}
.hot-cold{background:rgba(77,142,255,0.10);color:var(--blue);border-color:rgba(77,142,255,0.25);}
.hot-bar{height:4px;border-radius:2px;background:var(--b1);overflow:hidden;width:80px;display:inline-block;vertical-align:middle;margin-left:4px;}
.hot-bar-fill{height:100%;border-radius:2px;transition:width .4s;}
/* FOLLOW-UP REMINDER */
.fu-alert{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;cursor:pointer;transition:all .15s;}
.fu-alert:hover{border-color:var(--blue);}
.fu-alert.urgent{border-color:rgba(255,68,102,0.4);background:rgba(255,68,102,0.05);}
.fu-alert.today{border-color:rgba(255,184,0,0.4);background:rgba(255,184,0,0.05);}
.fu-day-badge{padding:3px 9px;border-radius:100px;font-size:10px;font-weight:700;white-space:nowrap;}
.fu-alert-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
.fu-alert-sub{font-size:11px;color:var(--t2);}
/* HUNT */
.hunt-tpl-btn{padding:6px 14px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);color:var(--t2);background:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.hunt-tpl-btn:hover{border-color:var(--blue);color:var(--blue);}
.hunt-tpl-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.hunt-plat-btn{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);color:var(--t2);background:none;transition:all .15s;font-family:'DM Sans',sans-serif;}
.hunt-plat-btn:hover{border-color:var(--blue);color:var(--blue);}
.hunt-plat-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.hunt-arow{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:3px;}
.hunt-albl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);}
.hunt-aval{font-size:12px;color:var(--text);font-weight:500;}
.hunt-fu{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;}
.hunt-fu-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.hunt-fu-day{font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;}
.hunt-hi{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s;}
.hunt-hi:hover{border-color:var(--blue);}
.hunt-hi-url{font-size:12px;font-weight:600;color:var(--text);flex:1;}
.hunt-hi-niche{font-size:10px;color:var(--t3);}
.hunt-hi-time{font-size:10px;color:var(--t3);}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;}
.lbox{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:32px;width:320px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,0.4);}
.l-logo{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}.l-logo span{color:var(--blue);}
.l-ver{font-size:10px;font-weight:700;padding:2px 9px;border-radius:100px;background:rgba(0,229,160,0.1);color:var(--green);border:1px solid rgba(0,229,160,0.25);display:inline-block;margin-bottom:16px;}
.mg{display:flex;flex-direction:column;gap:7px;}
.mbtn{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);cursor:pointer;transition:all .15s;width:100%;font-family:"DM Sans",sans-serif;text-align:left;}
.mbtn:hover{border-color:var(--blue);background:rgba(77,142,255,.06);}
.mav{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0;}
.mn{font-size:13px;font-weight:600;color:var(--text);}.mr{font-size:10px;color:var(--t3);}
#pin-wrap{display:none;}.pin-lbl{font-size:13px;color:var(--t2);margin-bottom:10px;}
.pin-in{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:12px;text-align:center;font-size:22px;font-family:"DM Mono",monospace;color:var(--text);outline:none;letter-spacing:8px;}
.pin-in:focus{border-color:var(--blue);}
.pin-err{color:var(--red);font-size:12px;margin-top:7px;display:none;}
.pin-back{background:none;border:none;color:var(--t2);font-size:12px;cursor:pointer;margin-top:8px;text-decoration:underline;font-family:"DM Sans",sans-serif;}

/* APP SHELL */
#app{display:none;}.shell{display:flex;min-height:100vh;}
.sb{width:215px;min-width:215px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-top{padding:16px 14px 12px;border-bottom:1px solid var(--b1);}
.sb-logo{font-family:"Syne",sans-serif;font-size:15px;font-weight:800;}.sb-logo span{color:var(--blue);}
.sb-ver{font-size:9px;font-weight:700;padding:1px 6px;border-radius:100px;background:rgba(0,229,160,0.1);color:var(--green);border:1px solid rgba(0,229,160,0.2);margin-top:3px;display:inline-block;}
.sb-user{display:flex;align-items:center;gap:8px;margin-top:9px;padding:7px 9px;background:var(--s2);border-radius:8px;border:1px solid var(--b1);}
.sb-av{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:10px;color:#fff;flex-shrink:0;}
.sb-un{font-size:12px;font-weight:600;flex:1;}.sb-ur{font-size:9px;color:var(--t3);text-transform:uppercase;}
.sb-lo{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:2px;}.sb-lo:hover{color:var(--red);}
.sb-nav{padding:9px 7px;flex:1;}
.sb-sec{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);padding:9px 8px 4px;}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;border:1px solid transparent;background:none;width:100%;text-align:left;font-family:"DM Sans",sans-serif;}
.ni:hover{background:var(--s2);color:var(--text);}.ni.on{background:rgba(77,142,255,.08);border-color:rgba(77,142,255,.2);color:var(--b2l);}
.ni-i{font-size:13px;width:17px;text-align:center;}
.nbg{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;}
.nbg-r{background:var(--red);color:#fff;}.nbg-g{background:var(--gold);color:#000;}
.sb-kpi{padding:9px;border-top:1px solid var(--b1);}
.kr{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--b1);}
.kr:last-child{border:none;}.kl{color:var(--t3);}.kv{font-weight:700;font-size:13px;font-family:"Syne",sans-serif;}
.main{flex:1;overflow-y:auto;}
.pg{display:none;padding:24px;max-width:920px;}.pg.on{display:block;}
.ph{margin-bottom:20px;}.pt{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px;}.pt .hl{color:var(--blue);}
.ps-sub{color:var(--t2);font-size:12px;}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:13px;padding:18px;margin-bottom:13px;}
.ct{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);margin-bottom:11px;display:flex;align-items:center;gap:8px;}
.ct::after{content:"";flex:1;height:1px;background:var(--b1);}

/* DASH */
.dsg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:13px;}
.dsc{background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:13px;text-align:center;}
.dsv{font-family:"Syne",sans-serif;font-size:24px;font-weight:800;}.dsl{font-size:10px;color:var(--t3);margin-top:2px;text-transform:uppercase;}
.tgrd{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;}
.tc{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:13px;cursor:pointer;transition:all .2s;}
.tc:hover{border-color:var(--blue);transform:translateY(-2px);}.tc.ov{border-color:rgba(255,68,102,.2);}
.tc-n{font-weight:700;font-size:12px;margin-bottom:2px;}.tc-s{font-size:10px;color:var(--t3);margin-bottom:7px;}
.tbdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;}
.tbdg-t{background:rgba(77,142,255,.12);color:var(--b2l);border:1px solid rgba(77,142,255,.25);}
.tbdg-o{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.25);}

/* URL BAR */
.url-bar{display:flex;gap:7px;background:var(--s2);border:1px solid var(--b1);border-radius:11px;padding:4px 4px 4px 14px;transition:all .2s;}
.url-bar:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(77,142,255,.08);}
.url-in{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:"DM Mono",monospace;font-size:12px;padding:7px 0;}
.url-in::placeholder{color:var(--t3);font-family:"DM Sans",sans-serif;}
.scan-btn{background:linear-gradient(135deg,var(--blue),#3B6FD4);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-family:"Syne",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.scan-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(77,142,255,.3);}
.scan-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* PIPELINE */
.pipe-wrap{display:none;margin-top:12px;}.pipe-wrap.show{display:block;}
.psr{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--s2);border:1px solid var(--b1);font-size:12px;margin-bottom:4px;transition:all .3s;}
.psr.run{border-color:rgba(77,142,255,.3);}.psr.ok{border-color:rgba(0,229,160,.2);}.psr.fail{border-color:rgba(255,68,102,.2);}
.pico{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;}
.pi-idle{background:var(--s3);color:var(--t3);}
.pi-spin{background:rgba(77,142,255,.15);color:var(--blue);animation:spin .8s linear infinite;}
.pi-ok{background:rgba(0,229,160,.15);color:var(--green);}
.pi-fail{background:rgba(255,68,102,.15);color:var(--red);}
.pi-warn{background:rgba(255,184,0,.15);color:var(--gold);}
@keyframes spin{to{transform:rotate(360deg)}}
.plbl{flex:1;color:var(--t2);}.pval{font-family:"DM Mono",monospace;font-size:10px;color:var(--t2);}

/* DETECT */
.det-sec{display:none;}.det-sec.show{display:block;}
.dgrd{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:7px;margin-bottom:12px;}
.dcard{background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:10px 11px;}
.dcl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--t3);margin-bottom:3px;}
.dcv{font-size:12px;font-weight:700;}
.dc-ok{color:var(--green);}.dc-no{color:var(--red);}.dc-warn{color:var(--gold);}.dc-txt{color:var(--text);}
.dcs{font-size:9px;color:var(--t3);margin-top:2px;font-family:"DM Mono",monospace;}
.adlib-link{display:flex;align-items:center;gap:9px;background:rgba(255,184,0,.05);border:1px solid rgba(255,184,0,.2);border-radius:9px;padding:10px 14px;text-decoration:none;transition:all .2s;margin-bottom:12px;}
.adlib-link:hover{background:rgba(255,184,0,.09);}
.adlib-t{font-size:12px;font-weight:700;color:var(--gold);}.adlib-s{font-size:10px;color:var(--t3);margin-top:1px;}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.fgrp{display:flex;flex-direction:column;gap:3px;}.fgrp.full{grid-column:1/-1;}
.fl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);}
.fi,.fsel,.fta{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 11px;color:var(--text);font-family:"DM Sans",sans-serif;font-size:12px;outline:none;transition:border-color .15s;width:100%;}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--blue);}
.fsel option{background:var(--s2);}
.fta{resize:vertical;min-height:56px;line-height:1.6;}

/* ISSUE SELECTOR */
.issue-box{background:rgba(77,142,255,.04);border:1px solid rgba(77,142,255,.15);border-radius:9px;padding:12px;margin-bottom:12px;}
.issue-box-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--b2l);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.itags{display:flex;flex-wrap:wrap;gap:5px;}
.itag{font-size:11px;font-weight:500;padding:4px 10px;border-radius:100px;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--t2);transition:all .15s;user-select:none;}
.itag:hover{border-color:var(--b2);color:var(--text);}
.itag.sel-red{background:rgba(255,68,102,.1);border-color:rgba(255,68,102,.4);color:var(--red);}
.itag.sel-blue{background:rgba(77,142,255,.1);border-color:rgba(77,142,255,.4);color:var(--b2l);}
.itag.sel-green{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.3);color:var(--green);}

.gen-btn{width:100%;background:linear-gradient(135deg,var(--green),var(--g2));color:#000;border:none;border-radius:9px;padding:12px;font-family:"Syne",sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;}
.gen-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,229,160,.25);}
.gen-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.ai-load{display:none;text-align:center;padding:36px;}.ai-load.show{display:block;}
.ai-ring{width:38px;height:38px;border:3px solid var(--b2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 11px;}
.ai-txt{color:var(--t2);font-size:12px;}

/* OUTPUT */
.out-wrap{display:none;}.out-wrap.show{display:block;}
.ptabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;}
.ptab{padding:5px 12px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b1);color:var(--t2);background:none;transition:all .15s;font-family:"DM Sans",sans-serif;}
.ptab:hover{border-color:var(--blue);color:var(--blue);}.ptab.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.pmsg{display:none;}.pmsg.on{display:block;}
.mbox{background:var(--s2);border:1px solid var(--b1);border-radius:9px;overflow:hidden;margin-bottom:7px;}
.mh{padding:7px 12px;background:var(--s3);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;}
.ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);}
.msubj{padding:7px 12px;background:rgba(77,142,255,.04);border-bottom:1px solid var(--b1);font-size:11px;color:var(--t2);}.msubj b{color:var(--text);}
.mbody{padding:12px;font-size:12px;line-height:1.9;color:#7A90B5;white-space:pre-wrap;}
.cbtn{background:none;border:1px solid var(--b2);border-radius:5px;color:var(--t2);padding:3px 8px;font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;font-family:"DM Sans",sans-serif;}
.cbtn:hover{border-color:var(--blue);color:var(--blue);}.cbtn.ok{border-color:var(--green);color:var(--green);}
.fu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:7px;margin-bottom:12px;}
.fu-c{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;}
.fu-b{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:100px;margin-bottom:4px;text-transform:uppercase;}
.fu-n{font-size:11px;font-weight:600;color:var(--t2);}.fu-s{font-size:10px;color:var(--t3);margin-top:1px;}
.plat-check{margin-top:14px;padding:13px;background:rgba(0,229,160,.04);border:1px solid rgba(0,229,160,.15);border-radius:9px;}
.plat-check-t{font-size:11px;font-weight:600;color:var(--green);margin-bottom:8px;}
.pc-opts{display:flex;gap:6px;flex-wrap:wrap;}
